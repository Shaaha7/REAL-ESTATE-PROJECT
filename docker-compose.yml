version: "3.9"
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    volumes: [./backend/data:/app/data, ./backend/logs:/app/logs, ./backend/mlruns:/app/mlruns]
    depends_on:
      mysql: {condition: service_healthy}
      mongo: {condition: service_started}
    restart: unless-stopped
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/api/health"]
      interval: 30s; timeout: 10s; retries: 3
  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [backend]
    restart: unless-stopped
  mysql:
    image: mysql:8.0
    environment: {MYSQL_ROOT_PASSWORD: password, MYSQL_DATABASE: realestate_db}
    ports: ["3306:3306"]
    volumes: [mysql_data:/var/lib/mysql]
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s; timeout: 5s; retries: 5
    restart: unless-stopped
  mongo:
    image: mongo:7.0
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
    restart: unless-stopped
  mlflow:
    image: python:3.11-slim
    command: bash -c "pip install mlflow --quiet && mlflow server --backend-store-uri /mlruns --host 0.0.0.0 --port 5000"
    ports: ["5000:5000"]
    volumes: [./backend/mlruns:/mlruns]
    restart: unless-stopped
volumes:
  mysql_data:
  mongo_data:
