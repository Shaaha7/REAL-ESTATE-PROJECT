name: PropAI CI/CD
on:
  push: {branches: [main, develop]}
  pull_request: {branches: [main]}
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: pip install -r backend/requirements.txt
      - run: pytest backend/tests/ -v --cov=backend/src --tb=short
        env: {LLM_PROVIDER: gemini, GOOGLE_API_KEY: ""}
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "20", cache: npm, cache-dependency-path: frontend/package.json}
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: {username: "${{ secrets.DOCKERHUB_USERNAME }}", password: "${{ secrets.DOCKERHUB_TOKEN }}"}
      - uses: docker/build-push-action@v5
        with: {context: ./backend, push: true, tags: "${{ secrets.DOCKERHUB_USERNAME }}/propai-backend:latest"}
      - uses: docker/build-push-action@v5
        with: {context: ./frontend, push: true, tags: "${{ secrets.DOCKERHUB_USERNAME }}/propai-frontend:latest"}
